<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aplikacje Macosh</title>
  <meta name="description" content="Oficjalna strona aplikacji Macosh.">
  <style>

    p { color: #b8bac2; }
  </style>
</head>
<body>
  <main>
    <h1>Aplikacje Macosh</h1>
    <p>Oficjalna strona aplikacji mobilnych Macosh.</p>
  </main>

</html>
